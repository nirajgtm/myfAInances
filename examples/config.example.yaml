# Generated by scripts/init.sh. This is a reference of every supported key.

# Paths (init.sh fills these from your prompts)
inbox_path: "~/claude-configs/finance/inbox"
archive_path: "~/claude-configs/finance/archive"
db_path: "~/claude-configs/finance/db"
extracted_path: "~/claude-configs/finance/extracted"
personal_path: "~/claude-configs/finance/personal"
skill_path: "~/claude-configs/finance/skill"

# Anomaly thresholds
large_txn_threshold: 500          # flag any single charge at or above this amount
recent_price_increase_pct: 15     # subscription price-increase flag threshold
outlier_stddev_multiplier: 2      # per-merchant amount outlier threshold
late_night_window: ["00:00", "05:00"]
foreign_txn_flag: true

# Retention
retention:
  delete_archive_after_days: 0    # 0 = never delete; e.g. 365 = purge archive older than a year
  redact_account_numbers_in_logs: true
